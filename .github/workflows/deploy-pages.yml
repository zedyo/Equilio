name: Deploy Demo to GitHub Pages

on:
  push:
    branches:
      - claude/add-project-documentation-1Qnpn
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (production)
        run: npm run prod

      - name: Assemble static site
        run: |
          mkdir -p _site/js _site/css
          cp -r public/js/. _site/js/
          cp -r public/css/. _site/css/
          cp demo/index.html _site/index.html
          cp public/favicon.ico _site/favicon.ico || true
          # SPA-Fallback (HashRouter braucht das streng genommen nicht,
          # schadet aber nicht und fängt direkte Unterpfade ab):
          cp demo/index.html _site/404.html
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
